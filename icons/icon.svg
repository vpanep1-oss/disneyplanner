<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0c447c"/>
  <!-- Castle silhouette -->
  <!-- Center spire -->
  <rect x="236" y="140" width="40" height="120" fill="#fff" opacity="0.95"/>
  <polygon points="256,100 236,140 276,140" fill="#fff" opacity="0.95"/>
  <!-- Left spire -->
  <rect x="166" y="180" width="28" height="80" fill="#fff" opacity="0.9"/>
  <polygon points="180,148 166,180 194,180" fill="#fff" opacity="0.9"/>
  <!-- Right spire -->
  <rect x="318" y="180" width="28" height="80" fill="#fff" opacity="0.9"/>
  <polygon points="332,148 318,180 346,180" fill="#fff" opacity="0.9"/>
  <!-- Main castle body -->
  <rect x="186" y="260" width="140" height="120" fill="#fff" opacity="0.95"/>
  <!-- Left tower -->
  <rect x="146" y="260" width="56" height="100" fill="#fff" opacity="0.9"/>
  <!-- Right tower -->
  <rect x="310" y="260" width="56" height="100" fill="#fff" opacity="0.9"/>
  <!-- Archway (door) -->
  <path d="M236,380 Q236,340 256,340 Q276,340 276,380 Z" fill="#0c447c"/>
  <rect x="236" y="355" width="40" height="25" fill="#0c447c"/>
  <!-- Windows -->
  <rect x="204" y="278" width="18" height="22" rx="3" fill="#0c447c" opacity="0.7"/>
  <rect x="290" y="278" width="18" height="22" rx="3" fill="#0c447c" opacity="0.7"/>
  <!-- Sparkle stars -->
  <text x="90" y="160" font-size="44" font-family="sans-serif" fill="#e6f1fb" opacity="0.9">✦</text>
  <text x="370" y="200" font-size="30" font-family="sans-serif" fill="#e6f1fb" opacity="0.8">✦</text>
  <text x="130" y="340" font-size="22" font-family="sans-serif" fill="#e6f1fb" opacity="0.6">✦</text>
</svg>
