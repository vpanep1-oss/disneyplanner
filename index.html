*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f4f0;padding:1rem;}
.app{max-width:800px;margin:0 auto;padding:1rem 0;}
.app-title{font-size:20px;font-weight:500;margin-bottom:1.25rem;color:#1a1a1a;}
.tabs{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap;}
.tab{padding:6px 14px;border-radius:8px;border:0.5px solid #bbb;background:transparent;color:#666;cursor:pointer;font-size:13px;font-family:inherit;}
.tab.active{background:#e6f1fb;color:#0c447c;border-color:#85b7eb;font-weight:500;}
.section{display:none;}.section.active{display:block;}
h2{font-size:16px;font-weight:500;margin-bottom:1rem;color:#1a1a1a;}
h3{font-size:14px;font-weight:500;margin-bottom:8px;color:#1a1a1a;}
.card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px;}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;}
.badge-purple{background:#EEEDFE;color:#3C3489;}
.badge-amber{background:#FAEEDA;color:#633806;}
.badge-green{background:#EAF3DE;color:#27500A;}
.badge-gray{background:#F1EFE8;color:#444441;}
.badge-red{background:#FCEBEB;color:#791F1F;}
.badge-blue{background:#E6F1FB;color:#0C447C;}
.ride-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid #eee;gap:8px;}
.ride-row:last-child{border-bottom:none;}
.ll-btn{font-size:11px;padding:3px 8px;border-radius:8px;border:0.5px solid #ccc;background:transparent;cursor:pointer;font-family:inherit;color:#666;white-space:nowrap;}
.ll-btn.sel-mll{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC;}
.ll-btn.sel-ias{background:#FAEEDA;color:#633806;border-color:#EF9F27;}
.ll-btn.sel-no{background:#F1EFE8;color:#444441;border-color:#B4B2A9;}
select,input[type=text],input[type=date]{font-size:13px;padding:5px 8px;border-radius:8px;border:0.5px solid #bbb;background:#fff;color:#1a1a1a;font-family:inherit;}
.metric{background:#f5f4f0;border-radius:8px;padding:12px;}
.metric-label{font-size:12px;color:#666;margin-bottom:4px;}
.metric-value{font-size:22px;font-weight:500;color:#1a1a1a;}
.tip-box{background:#e6f1fb;border:0.5px solid #85b7eb;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#0c447c;}
.crowd-bar{height:8px;border-radius:4px;background:#eee;overflow:hidden;margin-top:4px;}
.crowd-fill{height:100%;border-radius:4px;}
.park-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.park-tab{padding:5px 12px;border-radius:8px;border:0.5px solid #bbb;background:transparent;cursor:pointer;font-size:12px;font-family:inherit;color:#666;}
.park-tab.active{background:#e6f1fb;color:#0c447c;border-color:#85b7eb;}
.sched-item{display:flex;gap:12px;padding:10px 0;border-bottom:0.5px solid #eee;align-items:flex-start;}
.sched-item:last-child{border-bottom:none;}
.sched-time{font-size:12px;color:#666;min-width:64px;padding-top:1px;}
.sched-dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.sched-sub{font-size:12px;color:#666;margin-top:2px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px;}
.cal-hdr{text-align:center;font-size:11px;color:#666;padding:4px 0;font-weight:500;}
.cal-day{text-align:center;padding:6px 2px;border-radius:8px;font-size:12px;cursor:pointer;border:0.5px solid transparent;}
.cal-day:hover{border-color:#bbb;}
.cal-day.selected{border:2px solid #85b7eb;background:#e6f1fb;}
.cal-day.today-marker{outline:2px solid #85b7eb;outline-offset:1px;}
.cal-day .cn{font-weight:500;font-size:13px;}
.cal-day .cl{font-size:10px;margin-top:1px;border-radius:3px;padding:1px 3px;}
.day-card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:10px 14px;margin-bottom:8px;}
.day-card-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.day-label{font-weight:500;font-size:13px;min-width:46px;}
.smbtn{font-size:12px;padding:4px 10px;border-radius:8px;border:0.5px solid #bbb;background:transparent;cursor:pointer;color:#666;font-family:inherit;}
.smbtn:hover{background:#f5f4f0;}
.hotel-card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:10px 14px;margin-bottom:10px;}
.hotel-card-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.badge-teal{background:#E1F5EE;color:#085041;}
.badge-violet{background:#EDE9FE;color:#3C3489;}
.trip-card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.trip-card.active-trip{border-color:#85b7eb;background:#f0f7ff;}
.trip-name{font-weight:500;font-size:13px;flex:1;min-width:120px;}
.trip-meta{font-size:12px;color:#666;}
@media(max-width:500px){.tabs{gap:4px;}.tab{font-size:12px;padding:5px 10px;}}
</style>

function pById(id){return PARKS.find(p=>p.id===id);}
function crowdInfo(n){
  n=Math.max(1,Math.min(10,n));
  if(n>=9)return{bg:'#FCEBEB',text:'#791F1F',fill:'#E24B4A',label:'Very High'};
  if(n>=7)return{bg:'#FAEEDA',text:'#633806',fill:'#EF9F27',label:'High'};
  if(n>=5)return{bg:'#EAF3DE',text:'#27500A',fill:'#639922',label:'Moderate'};
  return{bg:'#E1F5EE',text:'#085041',fill:'#1D9E75',label:'Low'};
}
function getCrowd(parkId,dateStr,dowOvr){
  const park=pById(parkId);if(!park)return 6;
  let dow=dowOvr!=null?dowOvr:3;
  if(dateStr){const d=new Date(dateStr+'T12:00:00');if(!isNaN(d))dow=d.getDay();}
  return Math.max(1,Math.min(10,park.baseCrowd+(park.weekMod[dow]||0)));
}
function parkOpts(sel,none){
  let o=none?'<option value="">— none —</option>':'';
  // Theme parks group
  o+='<optgroup label="Theme Parks">';
  THEME_PARKS.forEach(p=>{o+=`<option value="${p.id}"${p.id===sel?' selected':''}>${p.icon} ${p.name}</option>`;});
  o+='</optgroup>';
  if(!none){
    // Water parks
    const wps=PARKS.filter(p=>p.type==='water');
    if(wps.length){o+='<optgroup label="Water Parks">';wps.forEach(p=>{o+=`<option value="${p.id}"${p.id===sel?' selected':''}>${p.icon} ${p.name}</option>`;});o+='</optgroup>';}
    // Golf
    const gps=PARKS.filter(p=>p.type==='golf');
    if(gps.length){o+='<optgroup label="Mini Golf">';gps.forEach(p=>{o+=`<option value="${p.id}"${p.id===sel?' selected':''}>${p.icon} ${p.name}</option>`;});o+='</optgroup>';}
  }
  return o;
}
function transitColors(mode){
  if(mode==='skyliner')return{bg:'#E1F5EE',col:'#085041'};
  if(mode==='monorail')return{bg:'#EDE9FE',col:'#3C3489'};
  if(mode==='walk')return{bg:'#EAF3DE',col:'#27500A'};
  if(mode==='boat')return{bg:'#E6F1FB',col:'#0C447C'};
  return{bg:'#F1EFE8',col:'#444441'};
}
function transitIcon(mode){
  if(mode==='skyliner')return'🚅 Skyliner';
  if(mode==='monorail')return'🚝 Monorail';
  if(mode==='walk')return'🚶 Walk';
  if(mode==='boat')return'⛵ Boat';
  return'🚌 Bus';
}

function getHotelForDate(dateStr){
  if(!dateStr||!hotels.length)return null;
  return hotels.find(h=>h.checkIn<=dateStr&&h.checkOut>=dateStr)||null;
}

function getTransitInfo(parkId,dateStr){
  const activeStay=dateStr?getHotelForDate(dateStr):null;
  if(activeStay){
    const hotel=HOTELS.find(h=>h.id===activeStay.resortId);
    if(hotel&&hotel.transit[parkId]){
      const t=hotel.transit[parkId];
      const parkNames={mk:'Magic Kingdom',ep:'EPCOT',hs:'Hollywood Studios',ak:'Animal Kingdom'};
      const pName=parkNames[parkId]||parkId;
      const freq={bus:'Every 20 min',skyliner:'Continuous',monorail:'Continuous',walk:'Anytime',boat:'Every 30 min'}[t.mode]||'Every 20 min';
      const tip={bus:`Bus from ${hotel.short} main bus stop. Allow extra time during rope drop hours.`,skyliner:`Board Skyliner at ${hotel.short} station, direct to ${pName}.`,monorail:`Monorail from ${hotel.short} station to ${pName}.`,walk:`Short walk from ${hotel.short} to ${pName} entrance.`,boat:`Boat launch from ${hotel.short} dock to ${pName}.`}[t.mode]||'';
      return{mode:t.mode,time:t.time,freq,tip,hotelName:hotel.short,hotelIcon:hotel.icon};
    }
  }
  // fall back to Caribbean Beach defaults
  return{...TRANSIT[parkId],hotelName:'your resort',hotelIcon:'🏖️'};
}

function transitBadge(parkId,dateStr){
  const t=getTransitInfo(parkId,dateStr);if(!t)return'';
  const c=transitColors(t.mode);
  return`<span class="badge" style="background:${c.bg};color:${c.col};">${transitIcon(t.mode)} ${t.time}</span>`;
}
 
function showTab(t,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
  ({itinerary:renderItinerary,parks:renderParks,ll:renderLL,crowd:renderCrowd,schedule:renderSchedule,optimizer:renderOptimizer,tips:renderTips,shows:renderShows,water:renderWater,hotel:renderHotel,trips:renderTrips}[t]||function(){})();
}

function renderItinerary(){
  const el=document.getElementById('tab-itinerary');
  el.innerHTML=`<h2>Trip itinerary</h2>`+days.map(d=>{
    const park=pById(d.park);const hop=d.hop?pById(d.hop):null;
    const crowd=d.date?getCrowd(d.park,d.date):null;
    const ci=crowd!=null?crowdInfo(crowd):null;
    const activeStay=d.date?getHotelForDate(d.date):null;
    const activeHotel=activeStay?HOTELS.find(h=>h.id===activeStay.resortId):null;
    return`<div class="day-card"><div class="day-card-header">
      <span class="day-label">${d.label}</span>
      <input type="date" value="${d.date}" onchange="updDay(${d.id},'date',this.value)" style="width:140px;"/>
      <select onchange="updDay(${d.id},'park',this.value)">${parkOpts(d.park,false)}</select>
      <span style="font-size:12px;color:#666;">hop→</span>
      <select onchange="updDay(${d.id},'hop',this.value)">${parkOpts(d.hop,true)}</select>
      <input type="text" placeholder="Notes..." value="${d.note}" style="flex:1;min-width:80px;" onchange="updDay(${d.id},'note',this.value)"/>
      <button class="smbtn" onclick="goToSchedule(${d.id})" style="color:#0c447c;border-color:#85b7eb;">Schedule →</button>
      <button class="smbtn" onclick="removeDay(${d.id})">✕</button>
    </div>
    ${park?`<div style="margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <span style="font-size:16px;">${park.icon}</span>
      <span style="font-size:13px;font-weight:500;">${park.name}</span>
      <span style="font-size:12px;color:#666;">${park.open}–${park.close}</span>
      ${hop?`<span style="font-size:12px;color:#666;">→ hop to ${hop.name}</span>`:''}
      ${transitBadge(d.park,d.date)}
      ${activeHotel?`<span class="badge" style="background:#FFF8E6;color:#7A5100;">🏨 ${activeHotel.short}</span>`:''}
      ${ci?`<span class="badge" style="background:${ci.bg};color:${ci.text};">Crowd: ${ci.label} (${crowd}/10)</span>`:'<span style="font-size:12px;color:#999;">Add a date for crowd estimate</span>'}
    </div>`:''}
    </div>`;
  }).join('');
  el.innerHTML+=`<button class="smbtn" onclick="addDay()" style="margin-top:4px;padding:6px 14px;font-size:13px;">+ Add day</button>`;
  const hops=days.filter(d=>d.hop).length;
  const pc={};days.forEach(d=>{if(d.park)pc[d.park]=(pc[d.park]||0)+1;});
  const best=Object.entries(pc).sort((a,b)=>b[1]-a[1])[0];
  const bp=best?pById(best[0]):null;
  el.innerHTML+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-top:1.5rem;">
    <div class="metric"><div class="metric-label">Total days</div><div class="metric-value">${days.length}</div></div>
    <div class="metric"><div class="metric-label">Park hops</div><div class="metric-value">${hops}</div></div>
    <div class="metric"><div class="metric-label">Most days at</div><div class="metric-value" style="font-size:14px;padding-top:4px;">${bp?bp.name.split(' ')[0]:'—'}</div></div>
  </div>`;
}
function updDay(id,k,v){const d=days.find(x=>x.id===id);if(d)d[k]=v;saveState();renderItinerary();}
function removeDay(id){days=days.filter(d=>d.id!==id);saveState();renderItinerary();}
function addDay(){days.push({id:nextId++,label:`Day ${days.length+1}`,park:'mk',hop:'',note:'',date:''});saveState();renderItinerary();}
 
function renderParks(){
  const el=document.getElementById('tab-parks');

function getLLCounts(parkId){
  const park=pById(parkId);
  let t1=0,t2=0,sp=0,spPicked=0;
  park.rides.forEach(r=>{
    if(r.llType==='SP'&&r.ll==='sp')spPicked++;
    if(r.llType==='MLL'&&r.ll==='mll'){
      if(r.mllTier===1)t1++;
      else t2++;
    }
  });
  const allSP=[];THEME_PARKS.forEach(p=>p.rides.forEach(r=>{if(r.ll==='sp')allSP.push(r);}));
  return{t1,t2,totalMLL:t1+t2,spThisPark:spPicked,spAllParks:allSP.length,hasTiers:park.id!=='ak'};
}
function canSelectMLL(parkId,mllTier,currentCounts){
  const{t1,t2,totalMLL,hasTiers}=currentCounts;
  if(totalMLL>=3)return{ok:false,reason:'Already have 3 MLL pre-selections (max per day)'};
  if(!hasTiers)return{ok:totalMLL<3,reason:totalMLL>=3?'Max 3 MLL selections':'ok'};
  if(mllTier===1&&t1>=1)return{ok:false,reason:'Already have 1 Tier 1 MLL (max 1 Tier 1 pre-selection)'};
  if(mllTier===2&&t1===0&&t2>=3)return{ok:false,reason:'Max 3 MLL pre-selections reached'};
  if(mllTier===2&&t1>0&&t2>=2)return{ok:false,reason:'Already have 2 Tier 2 picks (max 2 when also picking Tier 1)'};
  return{ok:true,reason:''};
}

function setLL(pid,idx,val){
  const park=pById(pid);const ride=park.rides[idx];
  if(ride.ll===val){ride.ll=null;}
  else{
    if(val==='mll'&&ride.llType!=='SP'){
      const counts=getLLCounts(pid);
      const check=canSelectMLL(pid,ride.mllTier,counts);
      if(!check.ok){alert('Cannot add: '+check.reason);return;}
    }
    if(val==='sp'){
      const spTotal=THEME_PARKS.reduce((s,p)=>s+p.rides.filter(r=>r.ll==='sp').length,0);
      if(spTotal>=2&&ride.ll!=='sp'){alert('Cannot add: Max 2 Single Pass purchases per day across all parks.');return;}
    }
    ride.ll=val;
  }
  saveState();
  renderLLRides();
}

function renderOptimizerResults(){
  const el=document.getElementById('opt-results');if(!el)return;
  const numDays=parseInt(document.getElementById('opt-days').value)||4;
  const startDate=optStartDate;
  if(!startDate){el.innerHTML=`<div style="font-size:13px;color:#999;">Select a start date above.</div>`;return;}
  const start=new Date(startDate+'T12:00:00');if(isNaN(start)){el.innerHTML=`<div style="font-size:13px;color:#999;">Enter a valid date.</div>`;return;}
  const tripDays=[];
  for(let i=0;i<numDays;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    const dow=d.getDay();
    const dateStr=d.toISOString().split('T')[0];
    const dayName=d.toLocaleDateString('default',{weekday:'short',month:'short',day:'numeric'});
    const parkScores=THEME_PARKS.map(p=>({id:p.id,crowd:getCrowd(p.id,dateStr,dow)}));
    tripDays.push({i,dateStr,dayName,dow,parkScores});
  }
  function permute(arr){if(arr.length<=1)return[arr];const r=[];for(let i=0;i<arr.length;i++){permute([...arr.slice(0,i),...arr.slice(i+1)]).forEach(p=>r.push([arr[i],...p]));}return r;}
  const parkIds=THEME_PARKS.map(p=>p.id);
  let bestScore=Infinity,bestAssignment=null;
  if(numDays<=4){
    permute(parkIds).forEach(perm=>{
      let score=0;
      for(let i=0;i<Math.min(numDays,4);i++){
        const crowd=tripDays[i]?tripDays[i].parkScores.find(ps=>ps.id===perm[i]).crowd:5;
        score+=crowd;
        if(perm[i]==='ak'&&i===numDays-1)score+=3;
        if(perm[i]==='hs'&&tripDays[i]&&(tripDays[i].dow===0||tripDays[i].dow===6))score+=2;
      }
      if(score<bestScore){bestScore=score;bestAssignment=perm.slice(0,numDays);}
    });
  } else {
    bestAssignment=[];const pool=[...parkIds];
    for(let i=0;i<numDays;i++)bestAssignment.push(pool[i%pool.length]);
  }
  const rows=bestAssignment.map((pid,i)=>{
    const park=pById(pid);const td=tripDays[i];
    const crowd=td.parkScores.find(ps=>ps.id===pid).crowd;const ci=crowdInfo(crowd);
    const reasons=[];
    if(crowd<=5)reasons.push('Low crowd day');
    if(pid==='hs'&&td.dow>=1&&td.dow<=4)reasons.push('Weekday — best for HS');
    if(pid==='ak')reasons.push('Closes early — go first');
    if(pid==='mk')reasons.push('Full day needed');
    const tr=TRANSIT[pid];
    if(tr)reasons.push(tr.mode==='skyliner'?'🚡 Skyliner direct':'🚌 Bus ~'+tr.time);
    const alts=td.parkScores.filter(ps=>ps.id!==pid).sort((a,b)=>a.crowd-b.crowd).slice(0,2);
    return{park,td,crowd,ci,reasons,alts};
  });
  const avg=Math.round(rows.reduce((s,r)=>s+r.crowd,0)/rows.length);
  const worst=rows.reduce((a,b)=>a.crowd>b.crowd?a:b);
  el.innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:1rem;">
    <div class="metric"><div class="metric-label">Avg crowd</div><div class="metric-value">${avg}/10</div></div>
    <div class="metric"><div class="metric-label">Worst day</div><div class="metric-value" style="font-size:14px;padding-top:4px;">${worst.park.short} Day ${worst.td.i+1}</div></div>
    <div class="metric"><div class="metric-label">Trip score</div><div class="metric-value" style="color:${avg<=5?'#27500A':avg<=7?'#633806':'#791F1F'}">${avg<=5?'Great':avg<=7?'Good':'Busy'}</div></div>
  </div>
  ${rows.map((r,i)=>{const ci=r.ci;return`<div style="display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:0.5px solid #eee;">
    <div style="width:28px;height:28px;border-radius:50%;background:${ci.bg};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:${ci.text};flex-shrink:0;">${i+1}</div>
    <div style="flex:1;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="font-size:16px;">${r.park.icon}</span>
        <span style="font-weight:500;font-size:14px;">${r.park.name}</span>
        <span class="badge" style="background:${ci.bg};color:${ci.text};">${ci.label} (${r.crowd}/10)</span>
        <span style="font-size:12px;color:#666;">${r.td.dayName}</span>
      </div>
      ${r.reasons.length?`<div style="font-size:12px;color:#666;margin-top:4px;">${r.reasons.map(x=>'→ '+x).join(' · ')}</div>`:''}
      ${r.alts.length?`<div style="font-size:12px;color:#666;margin-top:3px;">Alternatives: ${r.alts.map(p=>{const c=crowdInfo(p.crowd);return`<span class="badge" style="background:${c.bg};color:${c.text};font-size:10px;">${pById(p.id).short} ${p.crowd}</span>`;}).join(' ')}</div>`:''}
    </div>
    <button class="smbtn" style="color:#0c447c;border-color:#85b7eb;font-size:12px;" onclick="applyOptDay(${i},'${r.park.id}','${r.td.dateStr}')">Apply →</button>
  </div>`;}).join('')}
  <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
    <button class="smbtn" style="color:#27500A;border-color:#639922;font-size:13px;padding:6px 14px;" onclick="applyAll(${JSON.stringify(rows.map(r=>({park:r.park.id,date:r.td.dateStr})))})">Apply all to itinerary</button>
    <button class="smbtn" style="font-size:13px;padding:6px 14px;" onclick="goToItinerary()">Go to itinerary →</button>
  </div>`;
}

function applySnapshot(saved){
  if(Array.isArray(saved.days))days=JSON.parse(JSON.stringify(saved.days));
  if(saved.nextId)nextId=saved.nextId;
  if(saved.optStartDate!=null)optStartDate=saved.optStartDate;
  if(Array.isArray(saved.hotels))hotels=JSON.parse(JSON.stringify(saved.hotels));
  if(saved.hotelNextId)hotelNextId=saved.hotelNextId;

// ── Firebase sync helpers ─────────────────────────────────────────────────────
function initFirebase(){
  if(!FIREBASE_CONFIG.apiKey||FIREBASE_CONFIG.apiKey==='YOUR_API_KEY')return false;
  try{
    try{firebase.app();}catch(e){firebase.initializeApp(FIREBASE_CONFIG);}
    db=firebase.firestore();
    return true;
  }catch(e){console.warn('Firebase init failed:',e);return false;}
}

function generateCode(){return Math.random().toString(36).substr(2,6).toUpperCase();}

function joinSyncCode(){
  const inp=document.getElementById('sync-code-input');
  const code=(inp?inp.value.trim():'').toUpperCase();
  if(!code){alert('Enter a sync code first.');return;}
  startSync(code);
}

function startSync(code){
  if(!db){updateSyncBar();return;}
  if(syncUnsubscribe){syncUnsubscribe();syncUnsubscribe=null;}
  syncCode=code.toUpperCase();
  syncStatus='connecting';
  localStorage.setItem('disneyPlanner_syncCode',syncCode);
  updateSyncBar();
  const docRef=db.collection('plans').doc(syncCode);
  syncUnsubscribe=docRef.onSnapshot(snap=>{
    syncStatus='synced';
    updateSyncBar();
    if(snap.exists){
      const remoteTime=snap.data().updatedAt||0;
      if(remoteTime>_lastWriteTime+1000){
        const data=snap.data();
        applySnapshot(data.snapshot);
        if(data.trips){setTrips(data.trips);}
        if(data.activeId){setActiveId(data.activeId);}
        updateTitleSubtitle();
        renderCurrentTab();
      }
    }
  },err=>{
    console.warn('Sync listener error:',err);
    syncStatus='error';
    updateSyncBar();
  });
}

function stopSync(){
  if(syncUnsubscribe){syncUnsubscribe();syncUnsubscribe=null;}
  syncCode=null;
  syncStatus='idle';
  localStorage.removeItem('disneyPlanner_syncCode');
  updateSyncBar();
}

function copySyncCode(){
  if(!syncCode)return;
  navigator.clipboard.writeText(syncCode).then(()=>{
    const btn=document.getElementById('sync-copy-btn');
    if(btn){btn.textContent='Copied!';setTimeout(()=>{btn.textContent='Copy code';},2000);}
  }).catch(()=>{prompt('Your sync code (copy this):',syncCode);});
}

}

function updateSyncBar(){
  const el=document.getElementById('sync-bar');if(!el)return;
  if(!db){el.innerHTML='';return;}
  if(!syncCode||syncStatus==='idle'){
    el.innerHTML=`<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1rem;padding:8px 12px;background:#fff;border:0.5px solid #ddd;border-radius:10px;font-size:12px;color:#666;">
      <span>☁️ Not synced</span>
      <button class="smbtn" style="color:#0c447c;border-color:#85b7eb;" onclick="startSync(generateCode())">New code</button>
      <span style="color:#ccc;">|</span>
      <input type="text" id="sync-code-input" placeholder="Enter code to join" style="width:120px;font-size:12px;padding:3px 6px;border:0.5px solid #ccc;border-radius:6px;text-transform:uppercase;" maxlength="8"/>
      <button class="smbtn" onclick="joinSyncCode()">Join</button>
    </div>`;
  }else if(syncStatus==='connecting'){
    el.innerHTML=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:1rem;padding:8px 12px;background:#fff;border:0.5px solid #ddd;border-radius:10px;font-size:12px;color:#888;">
      <span>⟳ Connecting to ${syncCode}…</span>
    </div>`;
  }else if(syncStatus==='synced'){
    el.innerHTML=`<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1rem;padding:8px 14px;background:#EAF3DE;border:0.5px solid #A3C97A;border-radius:10px;font-size:12px;color:#27500A;">
      <span>●&nbsp;Synced</span>
      <strong>Code: ${syncCode}</strong>
      <span style="color:#4a7a1e;font-size:11px;">Share this code to collaborate</span>
      <button id="sync-copy-btn" class="smbtn" style="color:#27500A;border-color:#639922;" onclick="copySyncCode()">Copy code</button>
      <button class="smbtn" style="color:#791F1F;border-color:#E24B4A;" onclick="stopSync()">Disconnect</button>
    </div>`;
  }else{
    el.innerHTML=`<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1rem;padding:8px 12px;background:#FCEBEB;border:0.5px solid #E24B4A;border-radius:10px;font-size:12px;color:#791F1F;">
      <span>✕ Sync error</span>
      <button class="smbtn" style="color:#791F1F;border-color:#E24B4A;" onclick="startSync('${syncCode}')">Retry</button>
      <button class="smbtn" onclick="stopSync()">Disconnect</button>
    </div>`;
  }
}

function saveState(){
  try{
    const snap=currentSnapshot();
    const id=getActiveId();
    if(id){
      const trips=getTrips();
      if(trips[id]){trips[id].snapshot=snap;trips[id].updated=Date.now();setTrips(trips);}
    }
    // Also persist as scratch so unsaved edits survive refresh
    localStorage.setItem('disneyPlanner',JSON.stringify(snap));
    // Push to Firestore if synced
    if(db&&syncCode){
      _lastWriteTime=Date.now();
      db.collection('plans').doc(syncCode).set({snapshot:snap,trips:getTrips(),activeId:getActiveId()||null,updatedAt:_lastWriteTime})
        .catch(e=>console.warn('Firebase write error:',e));
    }
  }catch(e){}
}

function loadState(){
  try{
    // Prefer the active named trip if one is set
    const id=getActiveId();
    if(id){
      const trips=getTrips();
      if(trips[id]){applySnapshot(trips[id].snapshot);return;}
    }
    // Fall back to scratch state
    const raw=localStorage.getItem('disneyPlanner');
    if(raw)applySnapshot(JSON.parse(raw));
  }catch(e){}
}

// ── Trips UI ───────────────────────────────────────────────────────
function renderTrips(){
  const el=document.getElementById('tab-trips');
  const trips=getTrips();
  const activeId=getActiveId();
  const ids=Object.keys(trips).sort((a,b)=>trips[b].created-trips[a].created);
  el.innerHTML=`<h2>My Trips</h2>
  <div class="tip-box">Save your current itinerary & Lightning Lane plan as a named trip. Load any saved trip to switch back to it.</div>
  <div class="card">
    <h3 style="margin-bottom:10px;">Save current plan as a new trip</h3>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <input type="text" id="trip-name-input" placeholder="e.g. Summer 2026" style="flex:1;min-width:160px;"
        onkeydown="if(event.key==='Enter')saveTripFromInput()"/>
      <button class="smbtn" style="color:#27500A;border-color:#639922;padding:5px 14px;font-size:13px;" onclick="saveTripFromInput()">Save trip</button>
    </div>
  </div>
  ${ids.length===0?'<div style="font-size:13px;color:#999;">No saved trips yet.</div>':ids.map(id=>{
    const t=trips[id];
    const isActive=id===activeId;
    const created=new Date(t.created).toLocaleDateString('default',{month:'short',day:'numeric',year:'numeric'});
    const updated=new Date(t.updated).toLocaleDateString('default',{month:'short',day:'numeric'});
    const dayCount=t.snapshot.days?t.snapshot.days.length:0;
    const parks=[...new Set((t.snapshot.days||[]).map(d=>d.park))].map(pid=>{const p=pById(pid);return p?p.icon:'';}).join(' ');
    return`<div class="trip-card${isActive?' active-trip':''}">
      <div style="flex:1;">
        <div class="trip-name">${escHtml(t.name)}${isActive?'<span class="badge badge-blue" style="margin-left:8px;font-size:10px;">active</span>':''}</div>
        <div class="trip-meta">${dayCount} day${dayCount!==1?'s':''} · ${parks} · saved ${created} · edited ${updated}</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        ${!isActive?`<button class="smbtn" style="color:#0c447c;border-color:#85b7eb;" onclick="loadTrip('${id}')">Load</button>`:`<button class="smbtn" style="color:#0c447c;border-color:#85b7eb;" onclick="saveCurrentToTrip('${id}')">Update</button>`}
        <button class="smbtn" onclick="renameTrip('${id}')">Rename</button>
        <button class="smbtn" style="color:#791F1F;border-color:#E24B4A;" onclick="deleteTrip('${id}')">Delete</button>
      </div>
    </div>`;
  }).join('')}`;
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function saveTripFromInput(){
  const input=document.getElementById('trip-name-input');
  const name=(input?input.value:'').trim();
  if(!name){alert('Enter a name for this trip.');return;}
  const id='trip_'+Date.now();
  const trips=getTrips();
  trips[id]={name,created:Date.now(),updated:Date.now(),snapshot:currentSnapshot()};
  setTrips(trips);
  setActiveId(id);
  // Also flush to scratch
  saveState();
  renderTrips();
}

function saveCurrentToTrip(id){
  const trips=getTrips();
  if(!trips[id])return;
  trips[id].snapshot=currentSnapshot();
  trips[id].updated=Date.now();
  setTrips(trips);
  saveState();
  renderTrips();
}

function loadTrip(id){
  const trips=getTrips();
  if(!trips[id])return;
  if(!confirm('Load "'+trips[id].name+'"? Your current unsaved changes will be replaced.'))return;
  applySnapshot(trips[id].snapshot);
  setActiveId(id);
  updateTitleSubtitle();
  // Persist loaded state to scratch without overwriting the stored trip snapshot
  const snap=currentSnapshot();
  localStorage.setItem('disneyPlanner',JSON.stringify(snap));
  if(db&&syncCode){
    _lastWriteTime=Date.now();
    db.collection('plans').doc(syncCode)
      .set({snapshot:snap,trips:getTrips(),activeId:id,updatedAt:_lastWriteTime})
      .catch(e=>console.warn('Firebase write error:',e));
  }
  // Return to itinerary
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab')[0].classList.add('active');
  document.getElementById('tab-itinerary').classList.add('active');
  renderItinerary();
}

function renameTrip(id){
  const trips=getTrips();
  if(!trips[id])return;
  const n=prompt('Rename trip:',trips[id].name);
  if(!n||!n.trim())return;
  trips[id].name=n.trim();
  trips[id].updated=Date.now();
  setTrips(trips);
  saveState();
  renderTrips();
}

function deleteTrip(id){
  const trips=getTrips();
  if(!trips[id])return;
  if(!confirm('Delete "'+trips[id].name+'"? This cannot be undone.'))return;
  delete trips[id];
  setTrips(trips);
  if(getActiveId()===id)setActiveId(null);
  saveState();
  renderTrips();
}

document.addEventListener("DOMContentLoaded", function(){
  loadState();
  renderItinerary();
  updateTitleSubtitle();

  // Firebase sync
  if(initFirebase()){
    const savedCode=localStorage.getItem('disneyPlanner_syncCode');
    if(savedCode)startSync(savedCode);
    else updateSyncBar();
  }else{
    updateSyncBar();
  }

  // PWA: Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(function(err) {
      console.warn('Service worker registration failed:', err);
    });
  }
});
</script>
</body>
</html>
